[cmake]
version = "3.15"
cmkr-include = "cmake/cmkr.cmake"

[project]
name = "slowedify"
languages = ["C", "CXX"]
description = "slowedify is an extension to change the speed of songs on Spotify."

[target.subhook]
type    = "static"
alias   = "Zeex::subhook"
sources = ["vendor/subhook/subhook.c"]
headers = ["vendor/subhook/subhook.h"]

msvc.compile-options     = ["/MP"]
msvc.compile-definitions = ["SUBHOOK_STATIC"]

[target.slowedify]
type                = "shared"
sources             = ["src/core/**.cpp", "src/core/**.h", "src/util/**.cpp", "src/util/**.h"]
include-directories = ["src", "vendor"]
compile-features    = ["cxx_std_20"]
compile-definitions = ["NOMINMAX"]
link-libraries      = ["Zeex::subhook"]

msvc.compile-options = ["/MP"]

[target.loader]
type             = "executable"
sources          = ["src/loader/main.cpp"]
compile-features = ["cxx_std_20"]

msvc.compile-options = ["/MP"]

[[install]]
targets = ["slowedify", "loader"]
destination = "$ENV{APPDATA}/Spotify"
